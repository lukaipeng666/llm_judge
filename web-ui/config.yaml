# LLM Judge 系统配置文件

# 数据库服务配置
database_service:
  host: "0.0.0.0"
  port: 16384
  database_url: "llm_judge.db"

# Web API服务配置
web_service:
  host: "0.0.0.0"
  port: 16385
  database_service_url: "http://localhost:16384"

# 前端服务配置
frontend_service:
  port: 16386
  host: "0.0.0.0"

# Redis服务配置
redis_service:
  host: "localhost"
  port: 16387
  db: 0
  max_wait_time: 300  # 最大等待时间（秒），超过并发限制时的等待超时
